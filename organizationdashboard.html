<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Dashboard</title>
    <script src="https://maps.googleapis.com/maps/api/js?AIzaSyC04f54ny3CkXEXEPRcz8bXgVk4-9Em4EA"></script>
    <link rel="stylesheet" href="organizationdashboardstyles.css">
</head>
<body>

    <div class="dashboard-container">
        <h2>Organization Dashboard</h2>

        <!-- 📌 Shelter Requests Section -->
        <div class="requests-container">
            <h3>Pending Shelter Requests</h3>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Gender</th>
                        <th>Needs</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="requestList"></tbody>
            </table>
        </div>

        <!-- 📍 Google Map to Show Homeless People Locations -->
        <div id="map"></div>

    </div>

    <script src="organizationdashboardscripts.js"></script>
</body>
</html>
